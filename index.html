<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <title>VCA Tracker BTC - Cible Libre</title>
   <style>
       :root {
           --bg: #0f1113; --card: #1a1d21; --border: #2d3136;
           --text: #ffffff; --text-dim: #9ca3af;
           --orange: #f59e0b; --orange-bg: rgba(245, 158, 11, 0.1);
           --accent: #3b82f6; --green: #10b981; --red: #ef4444;
       }
       body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
       .container { max-width: 1100px; margin: 0 auto; }
       .header { margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

       .input-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
       .field { display: flex; flex-direction: column; }
       .field label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
       input { background: #262a30; border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: white; font-size: 14px; border: 1px solid var(--border); }

       /* CHAMP CIBLE LIBRE EN ORANGE */
       .field.target-input { border: 1px solid var(--orange); padding: 8px; border-radius: 8px; background: var(--orange-bg); }
       .field.target-input input { border-color: var(--orange); }

       .orange-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 25px; }
       .orange-card { background: var(--orange-bg); border: 1px solid var(--orange); padding: 15px; border-radius: 8px; text-align: center; }
       .orange-label { font-size: 10px; color: var(--orange); text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
       .orange-val { font-size: 18px; font-weight: bold; color: var(--orange); font-family: monospace; }

       .btn-calc { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
       .btn-save { background: var(--green); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 10px; display: none; }

       table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
       th { text-align: left; padding: 12px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
       td { padding: 12px; border-bottom: 1px solid var(--border); }
   </style>
</head>
<body>

<div class="container">
   <div class="header">
       <h1>Tracker VCA Bitcoin - Flux Revolut</h1>
       <p style="color:var(--text-dim); font-size: 12px;">Flat Tax Provisionnée : 31,4% | Unité : USDC</p>
   </div>

   <div class="input-section">
       <div class="field"><label>Mois (Période)</label><input type="month" id="m-date" value="2026-03"></div>
       <div class="field"><label>Prix BTC ($)</label><input type="number" id="m-price" placeholder="Prix Revolut"></div>

       <div class="field target-input"><label>Cible ce mois ($)</label><input type="number" id="m-target" placeholder="Ex: 50, 100, 200..."></div>

       <div class="field"><label>Dépôt Revolut (€)</label><input type="number" id="m-eur" value="50"></div>
       <div class="field"><label>Taux Change (€/$)</label><input type="number" id="m-rate" value="1.085"></div>
       <div class="field"><label>Réserve USDC</label><input type="number" id="m-usdc" value="0"></div>
   </div>

   <button class="btn-calc" onclick="calculer()">Calculer l'opération</button>
   <button id="btn-save" class="btn-save" onclick="valider()">Valider le mois ✓</button>

   <div id="msg" style="margin: 20px 0; font-weight: bold; display:none; padding: 15px; border-radius: 8px; background: #262a30;"></div>

   <div class="orange-grid">
       <div class="orange-card"><div class="orange-label">Prix Moyen Achat</div><div class="orange-val" id="o-prma">0.00 $</div></div>
       <div class="orange-card"><div class="orange-label">Plus-values réalisées</div><div class="orange-val" id="o-pvr">0.00 $</div></div>
       <div class="orange-card"><div class="orange-label">Flat Tax due (31.4%)</div><div class="orange-val" id="o-tax">0.00 $</div></div>
       <div class="orange-card"><div class="orange-label">Plus-values latentes</div><div class="orange-val" id="o-lat">0.00 $</div></div>
       <div class="orange-card"><div class="orange-label">Taxe latente estimée</div><div class="orange-val" id="o-taxlat">~ 0.00 $</div></div>
   </div>

   <div style="background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
       <h3 style="font-size: 12px; color: var(--text-dim); text-transform: uppercase;">Historique</h3>
       <table>
           <thead><tr><th>Mois</th><th>Prix BTC</th><th>Cible</th><th>Action</th><th>Montant</th><th>BTC Total</th><th>Taxe</th></tr></thead>
           <tbody id="h-body"></tbody>
       </table>
   </div>
</div>

<script>
   let s = { btc: 0, usdc: 0, costU: 0, pvr: 0, hist: [], cumTarget: 0 };

   function calculer() {
       const p = parseFloat(document.getElementById('m-price').value);
       const t = parseFloat(document.getElementById('m-target').value) || 0;
       const eur = parseFloat(document.getElementById('m-eur').value) || 0;
       const r = parseFloat(document.getElementById('m-rate').value) || 1;
       const curU = parseFloat(document.getElementById('m-usdc').value) || 0;

       if(!p) return alert("Indique le prix actuel du BTC");
       if(t <= 0) return alert("Indique ton objectif (Cible) pour ce mois");

       const depU = eur * r;
       const pool = curU + depU;
       const tempTarget = s.cumTarget + t;
       const btcVal = s.btc * p;
       const diff = tempTarget - btcVal;

       const msg = document.getElementById('msg');
       msg.style.display = "block";
       msg.style.color = diff > 0 ? "var(--green)" : "var(--red)";
       msg.innerText = (diff > 0 ? "ACTION : ACHETER " : "ACTION : VENDRE ") + Math.abs(diff).toFixed(2) + " USDC";

       const prma = s.btc > 0 ? s.costU / s.btc : 0;
       const lat = s.btc > 0 ? (p - prma) * s.btc : 0;

       document.getElementById('o-prma').innerText = prma.toFixed(2) + " $";
       document.getElementById('o-lat').innerText = (lat > 0 ? "+ " : "") + lat.toFixed(2) + " $";
       document.getElementById('o-taxlat').innerText = "~ " + (lat > 0 ? (lat * 0.314).toFixed(2) : "0.00") + " $";

       document.getElementById('btn-save').style.display = "inline-block";
       window.temp = { p, diff, t, pool, prma };
   }

   function valider() {
       const { p, diff, t, pool, prma } = window.temp;
       let tax = 0;

       if(diff > 0) {
           s.btc += (diff / p); s.costU += diff; s.usdc = pool - diff;
       } else {
           const amt = Math.abs(diff); const bSold = amt / p; const gain = (p - prma) * bSold;
           if(gain > 0) { tax = gain * 0.314; s.pvr += gain; }
           s.btc -= bSold; s.costU -= (bSold * prma); s.usdc = pool + (amt - tax);
       }

       s.cumTarget += t;
       const mStr = new Date(document.getElementById('m-date').value).toLocaleDateString('fr-FR', {month:'long', year:'numeric'});

       s.hist.push({ mStr, p, target: t, act: diff>0?'achat':'vente', amt: Math.abs(diff), btc: s.btc, tax });

       document.getElementById('o-pvr').innerText = s.pvr.toFixed(2) + " $";
       document.getElementById('o-tax').innerText = (s.pvr * 0.314).toFixed(2) + " $";
       document.getElementById('m-usdc').value = s.usdc.toFixed(2);
       document.getElementById('btn-save').style.display = "none";
       document.getElementById('msg').style.display = "none";

       document.getElementById('h-body').innerHTML = s.hist.slice().reverse().map(h => `
           <tr><td>${h.mStr}</td><td>${h.p}$</td><td>${h.target}$</td><td style="color:${h.act==='achat'?'var(--green)':'var(--red)'}">${h.act.toUpperCase()}</td><td>${h.amt.toFixed(2)}$</td><td>${h.btc.toFixed(6)}</td><td>${h.tax>0?h.tax.toFixed(2)+'$':'-'}</td></tr>
       `).join('');
   }
</script>
</body>
</html>

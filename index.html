<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <title>VCA Tracker BTC - Version Finale Synchronisée</title>
   <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   <style>
       :root {
           --bg: #0f1113; --card: #1a1d21; --border: #2d3136;
           --text: #ffffff; --text-dim: #9ca3af;
           --orange: #f59e0b; --orange-bg: rgba(245, 158, 11, 0.1);
           --accent: #3b82f6; --green: #52c41a; --blue: #1890ff; --red: #ef4444;
       }
       body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
       .container { max-width: 1100px; margin: 0 auto; }

       .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
       .nav-btns { display: flex; gap: 10px; }
       .btn-tool { background: #262a30; color: white; border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
       .btn-reset { background: rgba(239, 68, 68, 0.1); color: var(--red); border-color: var(--red); }

       .setup-section { background: #1e2227; border: 1px dashed var(--accent); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
       .setup-grid { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }

       .input-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
       .field { display: flex; flex-direction: column; }
       .field label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
       input { background: #262a30; border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: white; font-size: 14px; }

       .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
       .stat-card { background: #262a30; border: 1px solid var(--border); padding: 1rem; border-radius: 10px; text-align: center; }
       .stat-val { font-family: monospace; font-size: 16px; font-weight: bold; }

       .orange-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 25px; }
       .orange-card { background: var(--orange-bg); border: 1px solid var(--orange); padding: 15px; border-radius: 8px; text-align: center; }
       .orange-label { font-size: 10px; color: var(--orange); text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
       .orange-val { font-size: 18px; font-weight: bold; color: var(--orange); }

       .btn-main { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
       .btn-save { background: var(--green); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 10px; display: none; }

       .chart-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-top: 25px; height: 350px; }
       table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; }
       th { text-align: left; padding: 12px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
       td { padding: 12px; border-bottom: 1px solid var(--border); }
   </style>
</head>
<body>

<div class="container">
   <div class="header">
       <div>
           <h1>VCA Tracker BTC</h1>
           <p style="color:var(--text-dim); font-size: 12px;">Flat Tax 31.4% | Unité : USDC</p>
       </div>
       <div class="nav-btns">
           <button class="btn-tool" onclick="exportData()">Exporter</button>
           <button class="btn-tool" onclick="importData()">Importer</button>
           <button class="btn-tool btn-reset" onclick="resetAll()">Réinitialiser</button>
       </div>
   </div>

   <div id="setup-block" class="setup-section">
       <h3 style="font-size: 12px; color: var(--accent); margin-bottom: 10px;">CONFIGURER TA BASE ACTUELLE</h3>
       <div class="setup-grid">
           <div class="field"><label>BTC déjà possédés</label><input type="number" id="init-btc" step="any" value="0"></div>
           <div class="field"><label>USDC déjà possédés</label><input type="number" id="init-usdc" step="any" value="0"></div>
           <div class="field"><label>Prix d'achat moyen ($)</label><input type="number" id="init-prma" value="0"></div>
           <button class="btn-tool" style="background:var(--accent); height: 40px;" onclick="setBase()">Enregistrer la base</button>
       </div>
   </div>

   <div class="input-section">
       <div class="field"><label>Mois</label><input type="month" id="m-date" value="2026-03"></div>
       <div class="field"><label>Prix BTC ($)</label><input type="number" id="m-price" placeholder="Prix"></div>
       <div class="field"><label>Cible ($)</label><input type="number" id="m-target" value="50"></div>
       <div class="field"><label>Dépôt Revolut (€)</label><input type="number" id="m-eur" value="50"></div>
       <div class="field"><label>Taux (€/$)</label><input type="number" id="m-rate" value="1.085"></div>
   </div>

   <button class="btn-main" onclick="calculer()">Calculer l'opération</button>
   <button id="btn-save" class="btn-save" onclick="valider()">Valider le mois ✓</button>

   <div id="msg" style="margin: 20px 0; font-weight: bold; display:none; padding: 15px; border-radius: 8px; background: #262a30;"></div>

   <div class="stats-grid">
       <div class="stat-card"><div class="stat-label">BTC Accumulé</div><div class="stat-val" id="s-btc-total" style="color: var(--accent)">0</div></div>
       <div class="stat-card"><div class="stat-label">Valeur Portefeuille</div><div class="stat-val" id="s-val-total">0 $</div></div>
       <div class="stat-card"><div class="stat-label">Réserve USDC</div><div class="stat-val" id="s-usdc-res">0 $</div></div>
   </div>

   <div class="orange-grid">
       <div class="orange-card"><div class="orange-label">Prix Moyen Achat</div><div class="orange-val" id="o-prma">0.00 $</div></div>
       <div class="orange-card"><div class="orange-label">Plus-values réalisées</div><div class="orange-val" id="o-pvr">0.00 $</div></div>
       <div class="orange-card"><div class="orange-label">Taxe due</div><div class="orange-val" id="o-tax">0.00 $</div></div>
       <div class="orange-card"><div class="orange-label">Plus-values latentes</div><div class="orange-val" id="o-lat">0.00 $</div></div>
   </div>

   <div class="chart-container"><canvas id="vcaChart"></canvas></div>

   <div style="background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-top: 25px;">
       <table id="h-table">
           <thead><tr><th>Mois</th><th>Prix BTC</th><th>Cible</th><th>Action</th><th>Montant</th><th>Total Investi</th><th>BTC Total</th></tr></thead>
           <tbody id="h-body"></tbody>
       </table>
   </div>
</div>

<script>
   let s = JSON.parse(localStorage.getItem('vca_state')) || { btc: 0, usdc: 0, costU: 0, pvr: 0, hist: [], cumTarget: 0, setupDone: false };
   let chart;

   function setBase() {
       s.btc = parseFloat(document.getElementById('init-btc').value) || 0;
       s.usdc = parseFloat(document.getElementById('init-usdc').value) || 0;
       s.costU = s.btc * (parseFloat(document.getElementById('init-prma').value) || 0);
       s.setupDone = true;
       save(); updateUI();
       document.getElementById('setup-block').style.display = 'none';
   }

   function save() { localStorage.setItem('vca_state', JSON.stringify(s)); }

   function calculer() {
       const p = parseFloat(document.getElementById('m-price').value);
       const t = parseFloat(document.getElementById('m-target').value) || 0;
       const pool = s.usdc + (parseFloat(document.getElementById('m-eur').value) * parseFloat(document.getElementById('m-rate').value));
       const diff = (s.cumTarget + t) - (s.btc * p);

       const msg = document.getElementById('msg');
       msg.style.display = "block";
       msg.style.color = diff > 0 ? "var(--green)" : "var(--red)";
       msg.innerText = (diff > 0 ? "ACHAT : " : "VENTE : ") + Math.abs(diff).toFixed(2) + " USDC";

       document.getElementById('btn-save').style.display = "inline-block";
       window.temp = { p, diff, t, pool };
   }

   function valider() {
       const { p, diff, t, pool } = window.temp;
       const prma = s.btc > 0 ? s.costU / s.btc : 0;
       if(diff > 0) {
           s.btc += (diff / p); s.costU += diff; s.usdc = pool - diff;
       } else {
           const amt = Math.abs(diff); const bSold = amt / p;
           const gain = (p - prma) * bSold;
           if(gain > 0) s.pvr += gain;
           s.btc -= bSold; s.costU -= (bSold * prma); s.usdc = pool + amt;
       }
       s.cumTarget += t;
       const mStr = new Date(document.getElementById('m-date').value).toLocaleDateString('fr-FR', {month:'short', year:'2-digit'});
       s.hist.push({ date: mStr, p, t, act: diff>0?'ACHAT':'VENTE', amt: Math.abs(diff), btc: s.btc, val: s.btc*p, targetT: s.cumTarget, invested: s.costU });
       save(); updateUI(p);
   }

   function updateUI(price) {
       if(s.setupDone) document.getElementById('setup-block').style.display = 'none';
       document.getElementById('s-btc-total').innerText = s.btc.toFixed(8);
       document.getElementById('s-val-total').innerText = (s.btc * (price || 0)).toFixed(2) + " $";
       document.getElementById('s-usdc-res').innerText = s.usdc.toFixed(2) + " $";
       document.getElementById('o-prma').innerText = (s.btc > 0 ? s.costU / s.btc : 0).toFixed(2) + " $";
       document.getElementById('o-pvr').innerText = s.pvr.toFixed(2) + " $";
       document.getElementById('o-tax').innerText = (s.pvr * 0.314).toFixed(2) + " $";

       document.getElementById('h-body').innerHTML = s.hist.slice().reverse().map(h => `
           <tr><td>${h.date}</td><td>${h.p}$</td><td>${h.t}$</td><td style="color:${h.act==='ACHAT'?'var(--green)':'var(--red)'}">${h.act}</td><td>${h.amt.toFixed(2)}$</td><td>${h.invested.toFixed(2)}$</td><td>${h.btc.toFixed(6)}</td></tr>
       `).join('');
       updateChart();
   }

   function updateChart() {
       const ctx = document.getElementById('vcaChart').getContext('2d');
       if(chart) chart.destroy();
       chart = new Chart(ctx, {
           type: 'line',
           data: {
               labels: s.hist.map(h => h.date),
               datasets: [
                   { label: 'valeur réelle', data: s.hist.map(h => h.val), borderColor: '#52c41a', tension: 0.1, fill: false },
                   { label: 'cible VCA', data: s.hist.map(h => h.targetT), borderColor: '#52c41a', borderDash: [5, 5], tension: 0.1, fill: false },
                   { label: 'total investi', data: s.hist.map(h => h.invested), borderColor: '#1890ff', tension: 0.1, fill: false }
               ]
           },
           options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
       });
   }

   function resetAll() { if(confirm("Tout effacer ?")) { localStorage.clear(); location.reload(); } }
   function exportData() {
       const blob = new Blob([JSON.stringify(s)], {type: 'application/json'});
       const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'vca_backup.json'; a.click();
   }
   function importData() {
       const input = document.createElement('input'); input.type = 'file';
       input.onchange = e => {
           const reader = new FileReader();
           reader.onload = ev => { s = JSON.parse(ev.target.result); save(); location.reload(); };
           reader.readAsText(e.target.files[0]);
       };
       input.click();
   }

   if(s.setupDone) updateUI(s.hist.length > 0 ? s.hist[s.hist.length-1].p : 0);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCA Bitcoin - Flux USDC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* --- STYLE CLAIR & PRO --- */
:root {
 --bg: #f8f9fa; --surface: #ffffff; --border: #dee2e6;
 --text: #212529; --text2: #495057; --text3: #868e96;
 --accent: #2c6fad; --green: #2b8a3e; --green-bg: #ebfbee;
 --red: #c92a2a; --red-bg: #fff5f5;
 --radius: 12px; --shadow: 0 4px 6px rgba(0,0,0,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text); padding: 2rem 1rem; }
.wrap { max-width: 900px; margin: 0 auto; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
.header { border-bottom: 2px solid var(--border); margin-bottom: 2rem; padding-bottom: 1rem; }
.input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 1.5rem; }
.field { display: flex; flex-direction: column; }
.field label { font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--text2); text-transform: uppercase; }
input { padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 14px; }
.field.highlight { border: 2px solid var(--accent); padding: 10px; border-radius: 10px; background: #f0f7ff; }
.btn { padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
.btn-primary { background: var(--accent); color: white; }
.btn-outline { background: white; border: 2px solid var(--border); color: var(--text2); margin-left: 10px; }
.action-box { padding: 1.2rem; border-radius: 10px; margin-top: 1rem; border-left: 6px solid; }
.action-box.buy { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.action-box.sell { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 1.5rem; }
.stat-card { background: white; border: 1px solid var(--border); padding: 1rem; border-radius: 10px; text-align: center; }
.stat-label { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; }
.stat-val { font-family: 'DM Mono'; font-size: 16px; font-weight: 700; margin-top: 5px; }
.chart-container { height: 300px; }
table { width: 100%; border-collapse: collapse; font-family: 'DM Mono'; font-size: 12px; }
th { text-align: left; padding: 10px; border-bottom: 2px solid var(--border); color: var(--text3); }
td { padding: 10px; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div class="wrap">
   <div class="header">
       <h1>Tracker VCA Bitcoin/USDC</h1>
       <p>Fiscalité Provisionnée : 31,4% | Unité de compte : USDC</p>
   </div>

   <div class="card">
       <div class="input-grid">
           <div class="field" id="date-setup">
               <label>Mois de départ</label>
               <input type="month" id="start-date" value="2026-03">
           </div>
           <div class="field">
               <label>Prix BTC (en USDC)</label>
               <input type="number" id="btc-price" placeholder="Ex: 65000">
           </div>
           <div class="field">
               <label>Solde Réserve USDC</label>
               <input type="number" id="current-usdc" value="0">
           </div>
           <div class="field highlight">
               <label>Dépôt USDC ce mois</label>
               <input type="number" id="monthly-deposit" value="50">
           </div>
       </div>

       <div id="action-result" style="display:none"></div>

       <div class="btn-row">
           <button class="btn btn-primary" onclick="calculate()">Calculer l'Opération</button>
           <button id="btn-save" class="btn btn-outline" style="display:none" onclick="saveMonth()">Valider & Actualiser le portefeuille</button>
       </div>
   </div>

   <div class="stats">
       <div class="stat-card"><div class="stat-label">Investi (Poche)</div><div class="stat-val" id="stat-injected">0 USDC</div></div>
       <div class="stat-card"><div class="stat-label">Réserve USDC</div><div class="stat-val" id="stat-usdc" style="color:var(--accent)">0 USDC</div></div>
       <div class="stat-card"><div class="stat-label">Valeur BTC</div><div class="stat-val" id="stat-btc">0 USDC</div></div>
       <div class="stat-card" style="background:#f0f7ff"><div class="stat-label">Patrimoine Total</div><div class="stat-val" id="stat-total">0 USDC</div></div>
   </div>

   <div class="card"><div class="chart-container"><canvas id="mainChart"></canvas></div></div>

   <div class="card" style="overflow-x:auto">
       <table>
           <thead><tr><th>Date</th><th>Dépôt</th><th>Opération</th><th>Montant</th><th>USDC Final</th><th>Valeur Totale</th></tr></thead>
           <tbody id="history-body"></tbody>
       </table>
   </div>
</div>

<script>
let state = {
   index: 0,
   btcHeld: 0,
   usdcHeld: 0,
   totalInjected: 0,
   targetStep: 100, // Cible de valeur BTC augmentant de 100 USDC chaque mois
   taxRate: 31.4,
   startDate: null,
   history: []
};

let chart = null;
let lastCalc = null;

function calculate() {
   const price = parseFloat(document.getElementById('btc-price').value);
   const deposit = parseFloat(document.getElementById('monthly-deposit').value) || 0;
   const currentUsdc = parseFloat(document.getElementById('current-usdc').value) || 0;

   if(!price) return alert("Indique le prix actuel du Bitcoin en USDC");

   if(!state.startDate) {
       state.startDate = new Date(document.getElementById('start-date').value);
       document.getElementById('start-date').disabled = true;
   }

   const target = (state.index + 1) * state.targetStep;
   const currentBtcValInUsdc = state.btcHeld * price;
   const diff = target - currentBtcValInUsdc;

   const res = document.getElementById('action-result');
   res.style.display = "block";
   const potentialUsdc = currentUsdc + deposit;

   if (diff > 0) { // BESOIN D'ACHETER
       res.className = "action-box buy";
       const msgManque = diff > potentialUsdc ? `<br><b>⚠️ Attention :</b> Ton solde USDC (${potentialUsdc.toFixed(2)}) est trop bas.` : '';
       res.innerHTML = `<h3>🛒 ACHAT : ${diff.toFixed(2)} USDC</h3><p>Le tracker va puiser dans ta réserve USDC pour accumuler du BTC.${msgManque}</p>`;
   } else if (diff < 0) { // BESOIN DE VENDRE
       res.className = "action-box sell";
       const netVersUsdc = Math.abs(diff) * (1 - (state.taxRate/100));
       res.innerHTML = `<h3>💰 VENTE : ${Math.abs(diff).toFixed(2)} USDC</h3><p>Vente de BTC. Après provision fiscale, <b>+${netVersUsdc.toFixed(2)} USDC</b> seront ajoutés à ta réserve.</p>`;
   } else {
       res.innerHTML = "<h3>✅ CIBLE ATTEINTE</h3><p>Aucun mouvement nécessaire ce mois-ci.</p>";
   }

   document.getElementById('btn-save').style.display = "inline-block";
   lastCalc = { price, diff, deposit, currentUsdc };
}

function saveMonth() {
   const { price, diff, deposit, currentUsdc } = lastCalc;

   state.totalInjected += deposit;
   let pool = currentUsdc + deposit;

   if(diff > 0) {
       // Achat de BTC avec l'USDC
       state.btcHeld += (diff / price);
       state.usdcHeld = pool - diff;
   } else {
       // Vente de BTC vers l'USDC
       const net = Math.abs(diff) * (1 - (state.taxRate/100));
       state.btcHeld -= (Math.abs(diff) / price);
       state.usdcHeld = pool + net;
   }

   let currentDate = new Date(state.startDate);
   currentDate.setMonth(currentDate.getMonth() + state.index);
   const dateStr = currentDate.toLocaleDateString('fr-FR', {month: 'long', year: 'numeric'});

   state.history.push({
       date: dateStr,
       deposit,
       action: diff > 0 ? "ACHAT" : "VENTE",
       amount: Math.abs(diff),
       usdc: state.usdcHeld,
       total: (state.btcHeld * price) + state.usdcHeld,
       injected: state.totalInjected
   });

   state.index++;
   updateUI(price);

   document.getElementById('btc-price').value = "";
   document.getElementById('current-usdc').value = state.usdcHeld.toFixed(2);
   document.getElementById('btn-save').style.display = "none";
   document.getElementById('action-result').style.display = "none";
}

function updateUI(lastPrice) {
   document.getElementById('stat-injected').textContent = state.totalInjected.toFixed(2) + " USDC";
   document.getElementById('stat-usdc').textContent = state.usdcHeld.toFixed(2) + " USDC";
   const btcVal = state.btcHeld * (lastPrice || 0);
   document.getElementById('stat-btc').textContent = btcVal.toFixed(2) + " USDC";
   document.getElementById('stat-total').textContent = (btcVal + state.usdcHeld).toFixed(2) + " USDC";

   const body = document.getElementById('history-body');
   body.innerHTML = state.history.slice().reverse().map(h => `
       <tr>
           <td>${h.date}</td>
           <td>+${h.deposit}</td>
           <td style="color:${h.action==='ACHAT'?'var(--green)':'var(--red)'}">${h.action}</td>
           <td>${h.amount.toFixed(2)}</td>
           <td style="color:var(--accent)">${h.usdc.toFixed(2)}</td>
           <td><b>${h.total.toFixed(2)}</b></td>
       </tr>
   `).join('');

   renderChart();
}

function renderChart() {
   const ctx = document.getElementById('mainChart').getContext('2d');
   if(chart) chart.destroy();
   chart = new Chart(ctx, {
       type: 'line',
       data: {
           labels: state.history.map(h => h.date),
           datasets: [
               { label: 'Patrimoine (BTC+USDC)', data: state.history.map(h => h.total), borderColor: '#2c6fad', backgroundColor: 'rgba(44,111,173,0.05)', fill: true, tension: 0.3 },
               { label: 'Investi (Sortie de poche)', data: state.history.map(h => h.injected), borderColor: '#adb5bd', borderDash: [5,5], fill: false }
           ]
       },
       options: { responsive: true, maintainAspectRatio: false }
   });
}
</script>
</body>
</html>

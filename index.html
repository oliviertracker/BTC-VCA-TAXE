<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCA Bitcoin Tracker - Dashboard Complet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* --- STYLES DESIGN CLAIR & BLOCS ORANGE --- */
:root {
 --bg: #f8f9fa; --surface: #ffffff; --border: #dee2e6;
 --text: #212529; --text2: #495057; --text3: #adb5bd;
 --accent: #2c6fad; --accent-light: #e7f1ff;
 --green: #2b8a3e; --green-line: #52c41a;
 --orange: #d97706; --orange-bg: #fffbeb; --orange-border: #f59e0b;
 --blue-line: #1890ff;
 --radius: 12px; --radius-sm: 8px;
 --shadow: 0 4px 6px rgba(0,0,0,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text); padding: 2rem 1rem; line-height: 1.5; }
.wrap { max-width: 1100px; margin: 0 auto; }

/* EN-TÊTE */
.header { border-bottom: 2px solid var(--border); margin-bottom: 2.5rem; padding-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 24px; color: var(--accent); }
.header p { color: var(--text3); font-size: 13px; font-weight: 500; }

/* CARTES ET SAISIE */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
.input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 1rem; }

.field { display: flex; flex-direction: column; }
.field label { font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
input { padding: 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Mono', monospace; font-size: 14px; outline: none; transition: 0.15s; }
input:focus { border-color: var(--accent); }

/* MISE EN AVANT DÉPÔT / CHANGE REVOLUT */
.field.revolut-eur { border-left: 5px solid var(--accent); padding-left: 10px; }
.field.revolut-rate { border-left: 5px solid var(--orange-border); padding-left: 10px; }

/* BLOCS ORANGE (Fiscalité comme photo d'origine) */
.tax-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; margin-bottom: 2.5rem; }
.tax-card { background: var(--orange-bg); border: 1px solid var(--orange-border); padding: 1.25rem; border-radius: var(--radius); text-align: center; }
.tax-label { font-size: 10px; color: var(--orange); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
.tax-val { font-family: 'DM Mono'; font-size: 17px; font-weight: 700; color: #92400e; }

/* BOUTONS ET MESSAGES */
.btn { padding: 12px 24px; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer; border: none; transition: 0.2s; font-size: 14px; }
.btn-primary { background: var(--accent); color: white; margin-right: 12px; }
.btn-primary:hover { opacity: 0.9; }
.btn-save { background: white; border: 2px solid var(--border); color: var(--text2); }
.btn-save:hover { background: var(--bg); }

.action-result { padding: 1.25rem; border-radius: var(--radius-sm); margin-top: 2rem; border-left: 6px solid; font-size: 14px; display: none; }
.action-result.buy { background: #ebfbee; border-color: var(--green); color: #1e602e; }
.action-result.sell { background: #fff5f5; border-color: #c92a2a; color: #7f1d1d; }

/* GRAPHIQUE ET TABLEAU */
.chart-card { height: 320px; }
table { width: 100%; border-collapse: collapse; font-family: 'DM Mono'; font-size: 12px; margin-top: 1rem; }
th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: var(--text3); }
td { padding: 12px; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div class="wrap">
   <div class="header">
       <h1>Tracker Bitcoin VCA</h1>
       <div style="text-align: right;">
           <p>Fiscalité provisionnée : 31,4% (Flat Tax)</p>
           <p>Unité de compte : USDC</p>
       </div>
   </div>

   <div class="card">
       <div class="input-grid">
           <div class="field">
               <label>Mois (Période)</label>
               <input type="month" id="m-date" value="2026-03">
           </div>
           <div class="field">
               <label>Prix BTC ($)</label>
               <input type="number" id="m-price" placeholder="Prix Revolut">
           </div>
           <div class="field">
               <label>Solde Réserve USDC</label>
               <input type="number" id="cur-u" value="0">
           </div>
           <div class="field revolut-eur">
               <label>Dépôt Revolut (€)</label>
               <input type="number" id="dep-eur" value="50">
           </div>
           <div class="field revolut-rate">
               <label>Taux de Change (€/$)</label>
               <input type="number" id="ex-rate" value="1.085">
           </div>
       </div>

       <div id="m-action" class="action-result"></div>

       <div style="margin-top:2rem">
           <button class="btn btn-primary" onclick="calculer()">Calculer l'opération</button>
           <button id="btn-save" class="btn btn-save" style="display:none" onclick="validerMois()">Valider le mois ✓</button>
       </div>
   </div>

   <div class="tax-grid">
       <div class="tax-card">
           <div class="tax-label">Prix Moyen Achat</div>
           <div class="tax-val" id="f-prma">0.00 $</div>
       </div>
       <div class="tax-card">
           <div class="tax-label">Plus-values réalisées</div>
           <div class="tax-val" id="f-pvr">0.00 $</div>
       </div>
       <div class="tax-card">
           <div class="tax-label">Flat Tax Provisionnée</div>
           <div class="tax-val" id="f-tax">0.00 $</div>
       </div>
       <div class="tax-card">
           <div class="tax-label">Plus-values latentes</div>
           <div class="tax-val" id="f-lat">0.00 $</div>
       </div>
   </div>

   <div class="card chart-card">
       <canvas id="evolChart"></canvas>
   </div>

   <div class="card" style="overflow-x:auto">
       <div style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text3); margin-bottom: 10px;">Historique</div>
       <table>
           <thead>
               <tr>
                   <th>Mois</th>
                   <th>Dépôt (€)</th>
                   <th>Prix BTC ($)</th>
                   <th>Opération</th>
                   <th>Montant ($)</th>
                   <th>BTC Accumulé</th>
                   <th>Total Investi ($)</th>
                   <th>Taxe</th>
               </tr>
           </thead>
           <tbody id="h-body"></tbody>
       </table>
   </div>
</div>

<script>
let s = { idx: 0, btc: 0, usdc: 0, costU: 0, eurT: 0, pvr: 0, start: null, target: 100, history: [] };
let evolChart;

function calculer() {
   const p = parseFloat(document.getElementById('m-price').value);
   const e = parseFloat(document.getElementById('dep-eur').value) || 0;
   const r = parseFloat(document.getElementById('ex-rate').value) || 1;
   const u = parseFloat(document.getElementById('cur-u').value) || 0;
   if(!p) return alert("Indique le prix actuel du BTC");
   if(!s.start) s.start = new Date(document.getElementById('m-date').value);

   const depU = e * r;
   const pool = u + depU;
   const diff = ((s.idx + 1) * s.target) - (s.btc * p);

   const msg = document.getElementById('m-action');
   msg.style.display = "block";
   msg.style.borderColor = diff > 0 ? "var(--green)" : "#c92a2a";
   msg.innerHTML = diff > 0
       ? `<b style="color:var(--green)">ACHAT : ${diff.toFixed(2)} USDC</b><br><small>Convertis tes ${e}€ et utilise ta réserve (dispo: ${pool.toFixed(2)} USDC)</small>`
       : `<b style="color:#c92a2a">VENTE : ${Math.abs(diff).toFixed(2)} USDC</b><br><small>Le surplus sera revendu en USDC.</small>`;

   const prma = s.btc > 0 ? s.costU / s.btc : 0;
   const lat = s.btc > 0 ? (p - prma) * s.btc : 0;
   document.getElementById('f-prma').innerText = prma.toFixed(2) + " $";
   document.getElementById('f-lat').innerText = lat.toFixed(2) + " $";
   document.getElementById('btn-save').style.display = "inline-block";
   window.last = { p, diff, e, r, depU, pool, prma };
}

function validerMois() {
   const { p, diff, e, r, depU, pool, prma } = window.last;
   s.eurT += e;
   let t = 0;
   if(diff > 0) {
       s.btc += (diff / p); s.costU += diff; s.usdc = pool - diff;
   } else {
       const a = Math.abs(diff); const b = a / p; const g = (p - prma) * b;
       if(g > 0) { t = g * 0.314; s.pvr += g; }
       s.btc -= b; s.costU -= b * prma; s.usdc = pool + (a - t);
   }
   const dStr = new Date(document.getElementById('m-date').value).toLocaleDateString('fr-FR', {month:'short', year:'2-digit'});
   s.history.push({ date: dStr, eur: e, p, act: diff>0?'ACHAT':'VENTE', amt: Math.abs(diff), btc: s.btc, totalInv: s.costU, val: s.btc*p, targetT: (s.idx+1)*s.target, tax: t });
   s.idx++;

   document.getElementById('cur-u').value = s.usdc.toFixed(2);
   document.getElementById('f-pvr').innerText = s.pvr.toFixed(2) + " $";
   document.getElementById('f-tax').innerText = (s.pvr * 0.314).toFixed(2) + " $";
   document.getElementById('m-action').style.display = "none";
   document.getElementById('btn-save').style.display = "none";

   document.getElementById('h-body').innerHTML = s.history.slice().reverse().map(h => `
       <tr><td>${h.date}</td><td>${h.eur}€</td><td>${h.p}$</td><td style="color:${h.act==='ACHAT'?'var(--green)':'#c92a2a'}">${h.act}</td><td>${h.amt.toFixed(2)}</td>
       <td>${h.btc.toFixed(6)}</td><td>${h.totalInv.toFixed(2)}</td><td>${h.tax>0?h.tax.toFixed(2)+' $':'-'}</td></tr>
   `).join('');
   updateChart();
}

// MISE À JOUR DU GRAPHIQUE (DÉFINITIONS COULEURS ET LIGNES PHOTO EXEMPLE)
function updateChart() {
   const ctx = document.getElementById('evolChart').getContext('2d');
   if(evolChart) evolChart.destroy();
   evolChart = new Chart(ctx, {
       type: 'line',
       data: {
           labels: s.history.map(h => h.date),
           datasets: [
               { label: 'valeur réelle', data: s.history.map(h => h.val), borderColor: '#52c41a', pointBackgroundColor: '#52c41a', pointRadius: 3, tension: 0.1, fill: false },
               { label: 'cible VCA', data: s.history.map(h => h.targetT), borderColor: '#52c41a', pointRadius: 0, borderDash: [5, 5], tension: 0.1, fill: false },
               { label: 'total investi', data: s.history.map(h => h.totalInv), borderColor: '#1890ff', pointRadius: 0, tension: 0.1, fill: false }
           ]
       },
       options: {
           responsive: true, maintainAspectRatio: false,
           plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, font: { size: 10, family: 'DM Sans' } } } },
           scales: {
               x: { grid: { display: false } },
               y: { grid: { color: '#f0f0f0' }, ticks: { font: { family: 'DM Mono', size: 10 }, callback: v => v + ' $' } }
           }
       }
   });
}
</script>
</body>
</html>
